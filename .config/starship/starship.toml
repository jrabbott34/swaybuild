# Starship — Tokyo Night theme

format = """
[░▒▓](fg:#1a1b26)\
$os\
$username\
[](bg:#16161e fg:#1a1b26)\
$directory\
[](fg:#16161e bg:#2a2b3d)\
$git_branch\
$git_status\
[](fg:#2a2b3d bg:#1e2030)\
$nodejs\
$rust\
$golang\
$python\
$lua\
[](fg:#1e2030 bg:#414868)\
$time\
[ ](fg:#414868)\
\n$character"""

[os]
disabled = false
style = "bg:#1a1b26 fg:#c0caf5"

[os.symbols]
Linux = " "
Arch  = " "

[username]
show_always = true
style_user  = "bg:#1a1b26 fg:#7aa2f7"
style_root  = "bg:#1a1b26 fg:#f7768e"
format      = '[$user ]($style)'
disabled    = false

[directory]
style            = "bg:#16161e fg:#7dcfff"
format           = "[ $path ]($style)"
truncation_length = 3
truncate_to_repo = false

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music"     = "󰝚 "
"Pictures"  = " "
".config"   = " "

[git_branch]
symbol = " "
style  = "bg:#2a2b3d fg:#9ece6a"
format = '[ $symbol$branch ]($style)'

[git_status]
style  = "bg:#2a2b3d fg:#f7768e"
format = '[$all_status$ahead_behind ]($style)'

[nodejs]
symbol = " "
style  = "bg:#1e2030 fg:#9ece6a"
format = '[ $symbol($version) ]($style)'

[rust]
symbol = " "
style  = "bg:#1e2030 fg:#e0af68"
format = '[ $symbol($version) ]($style)'

[golang]
symbol = " "
style  = "bg:#1e2030 fg:#7dcfff"
format = '[ $symbol($version) ]($style)'

[python]
symbol = " "
style  = "bg:#1e2030 fg:#e0af68"
format = '[ $symbol($version) ]($style)'

[lua]
symbol = " "
style  = "bg:#1e2030 fg:#7aa2f7"
format = '[ $symbol($version) ]($style)'

[time]
disabled    = false
time_format = "%I:%M %p"
style       = "bg:#414868 fg:#c0caf5"
format      = '[ 󱑍 $time ]($style)'

[character]
success_symbol = "[❯](bold fg:#9ece6a)"
error_symbol   = "[❯](bold fg:#f7768e)"
vimcmd_symbol  = "[❮](bold fg:#bb9af7)"
