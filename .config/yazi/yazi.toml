[manager]
ratio          = [1, 2, 3]
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
show_hidden    = false
show_symlink   = true

[preview]
tab_size   = 2
max_width  = 600
max_height = 900

[opener]
edit = [
    { run = 'gedit "$@"', desc = "gedit", block = true },
]

[open]
rules = [
    { mime = "text/*",        use = "edit" },
    { mime = "image/*",       use = "open" },
    { mime = "video/*",       use = "play" },
    { mime = "audio/*",       use = "play" },
    { mime = "application/pdf", use = "open" },
]
